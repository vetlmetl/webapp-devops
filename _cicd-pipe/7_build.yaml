build-release:backend:
  stage: build
  image: golang:1.25
  needs:
    - job: extract_tag
      artifacts: true
  extends: .go-cache
  before_script:
    - tar --exclude='backend/.go' -czvf src-${ARTIFACT_BACK} backend/
  script:
    - set -euo pipefail
    - cd backend
    - go build -o momo-api ./cmd/api
    - tar -czvf ${ARTIFACT_BACK} momo-api
    - cd ..
    - curl --retry 12 --retry-all-errors --fail -u "${NEXUS_USER}:${NEXUS_PASSWORD}" --upload-file backend/${ARTIFACT_BACK} "${NEXUS_URL}${NEXUS_REPO}/${ARTIFACT_BACK}"
    - curl --retry 12 --retry-all-errors --fail -u "${NEXUS_USER}:${NEXUS_PASSWORD}" --upload-file src-${ARTIFACT_BACK} "${NEXUS_URL}${NEXUS_REPO}/src-${ARTIFACT_BACK}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_TITLE =~ /release:v[0-9]+\.[0-9]+\.[0-9]+/
      when: on_success

build-release:frontend:
  stage: build
  image: node:20-alpine
  needs:
    - job: extract_tag
      artifacts: true
##    - job: test:frontend
  before_script:
    - tar -czvf src-${ARTIFACT_FRONT} frontend/
    - apk add --no-cache curl bash
  script:
    - set -euo pipefail
    - cd frontend
    - npm ci
    - NODE_ENV=production VUE_APP_API_URL=http://api npm run build
    - tar -czvf ${ARTIFACT_FRONT} dist/ 
    - cd ..
    - curl --retry 12 --retry-all-errors --fail -u "${NEXUS_USER}:${NEXUS_PASSWORD}" --upload-file frontend/${ARTIFACT_FRONT} "${NEXUS_URL}${NEXUS_REPO}/${ARTIFACT_FRONT}"
    - curl --retry 12 --retry-all-errors --fail -u "${NEXUS_USER}:${NEXUS_PASSWORD}" --upload-file src-${ARTIFACT_FRONT} "${NEXUS_URL}${NEXUS_REPO}/src-${ARTIFACT_FRONT}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_TITLE =~ /release:v[0-9]+\.[0-9]+\.[0-9]+/
      when: on_success

build:backend_kaniko:
  stage: build
#  when: manual
  image:
#     name: ghcr.io/kaniko-build/dist/chainguard-forks-kaniko/executor:v1.25.13
     name: gcr.io/kaniko-project/executor:v1.24.0-debug
     entrypoint: [""]
  needs:
    - job: extract_tag
      artifacts: true
    - job: build-release:backend
    - job: monitoring:prometheus
      artifacts: true
  before_script:
    - mkdir -p /kaniko/.docker
    # Force kaniko's Google keychain to fall back to anonymous pulls for the
    # public gcr.io/distroless base image. Without this it sends invalid ADC
    # credentials to gcr.io and the token request fails with UNAUTHORIZED.
    - export GOOGLE_APPLICATION_CREDENTIALS=/nonexistent-disable-google-keychain.json
    - export REGISTRY_ID=$(cat registry.txt)
    - |
      YC_JSON_KEY=$(echo "${YC_KEY}" | base64 -d)
      AUTH=$(echo -n "json_key:${YC_JSON_KEY}" | base64 | tr -d '\n')
      echo "{\"auths\":{\"cr.yandex\":{\"auth\":\"${AUTH}\"}}}" > /kaniko/.docker/config.json
  script:
    - cd backend
    - |
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}/backend" \
        --dockerfile "${CI_PROJECT_DIR}/backend/Dockerfile" \
        --destination "cr.yandex/${REGISTRY_ID}/backend:${RELEASE_TAG}" \
        --destination "cr.yandex/${REGISTRY_ID}/backend:latest" \
        --image-download-retry=5 \
        --push-retry=3 \
        --cache=true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_TITLE =~ /release:v[0-9]+\.[0-9]+\.[0-9]+/
      when: on_success

