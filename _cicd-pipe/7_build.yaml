.trivy:scan:
  stage: build
  image:
    name: aquasec/trivy:0.58.1
    entrypoint: [""]
  allow_failure: true
  needs:
    - job: extract_tag
      artifacts: true
    - job: monitoring:prometheus
      artifacts: true
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_IGNORE_UNFIXED: "true"
    TRIVY_CACHE_DIR: "${CI_PROJECT_DIR}/.trivycache"
    DOCKER_CONFIG: "${CI_PROJECT_DIR}/.docker"
  cache:
    key: trivy-db
    paths:
      - .trivycache/
  before_script:
    - export REGISTRY_ID=$(cat registry.txt)
    - export IMAGE="cr.yandex/${REGISTRY_ID}/${COMPONENT}:${RELEASE_TAG}"
    - mkdir -p "${DOCKER_CONFIG}"
    - |
      YC_JSON_KEY=$(echo "${YC_KEY}" | base64 -d)
      AUTH=$(echo -n "json_key:${YC_JSON_KEY}" | base64 | tr -d '\n')
      echo "{\"auths\":{\"cr.yandex\":{\"auth\":\"${AUTH}\"}}}" > "${DOCKER_CONFIG}/config.json"
  script:
    - trivy image --scanners vuln --severity LOW,MEDIUM,HIGH,CRITICAL --exit-code 0 "${IMAGE}"
    - trivy image --scanners vuln --format template --template "@/contrib/gitlab.tpl" 
        -o "gl-container-scanning-report-${COMPONENT}.json" "${IMAGE}"
    - trivy image --scanners vuln --severity HIGH,CRITICAL --exit-code 1 "${IMAGE}"
  artifacts:
    when: always
    reports:
      container_scanning: gl-container-scanning-report-${COMPONENT}.json
    paths:
      - gl-container-scanning-report-${COMPONENT}.json
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_TITLE =~ /release:v[0-9]+\.[0-9]+\.[0-9]+/
      when: on_success

trivy:backend:
  extends: .trivy:scan
  variables:
    COMPONENT: backend
  needs:
    - job: extract_tag
      artifacts: true
    - job: monitoring:prometheus
      artifacts: true
    - job: build:backend_kaniko

trivy:frontend:
  extends: .trivy:scan
  variables:
    COMPONENT: frontend
  needs:
    - job: extract_tag
      artifacts: true
    - job: monitoring:prometheus
      artifacts: true
    - job: build:frontend_kaniko

create_release:
  stage: build
  needs:
    - job: extract_tag
      artifacts: true
    - job: build:frontend_kaniko
    - job: trivy:backend
    - job: trivy:frontend
    - job: monitoring:prometheus
      artifacts: true
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
#    - export RELEASE_TAG=$(cat release.txt)
    - echo ${RELEASE_TAG}
    - echo "${NEXUS_URL}${NEXUS_REPO}/src-${ARTIFACT_BACK}"
    - export REGISTRY_ID=$(cat registry.txt)
    - echo ${REGISTRY_ID}
    - echo "https://cr.yandex/${REGISTRY_ID}/backend:${RELEASE_TAG}"
    - |
      DESC="Source code and artifacts were built and pushed to Nexus Repository Manager, Docker images were built and pushed to Yandex Container Registry."
      RELEASE_DESC=$(printf '%s\n\n%s\n\n%s' "Commit message: ${COMMIT_MSG}" "${DESC}" "Author: ${GITLAB_USER_LOGIN}")
      echo "Creating GitLab release for tag ${RELEASE_TAG}"
      release-cli create \
        --name "Release ${RELEASE_TAG}" \
        --tag-name "${RELEASE_TAG}" \
        --description "${RELEASE_DESC}" \
        --assets-link "{\"name\":\"Backend Source Code\",\"url\":\"${NEXUS_URL}${NEXUS_REPO}/src-${ARTIFACT_BACK}\"}" \
        --assets-link "{\"name\":\"Backend Artifact\",\"url\":\"${NEXUS_URL}${NEXUS_REPO}/${ARTIFACT_BACK}\"}" \
        --assets-link "{\"name\":\"Backend Docker Image\",\"url\":\"https://cr.yandex/${REGISTRY_ID}/backend:${RELEASE_TAG}\"}" \
        --assets-link "{\"name\":\"Frontend Source Code\",\"url\":\"${NEXUS_URL}${NEXUS_REPO}/src-${ARTIFACT_FRONT}\"}" \
        --assets-link "{\"name\":\"Frontend Artifact\",\"url\":\"${NEXUS_URL}${NEXUS_REPO}/${ARTIFACT_FRONT}\"}" \
        --assets-link "{\"name\":\"Frontend Docker Image\",\"url\":\"https://cr.yandex/${REGISTRY_ID}/frontend:${RELEASE_TAG}\"}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_TITLE =~ /release:v[0-9]+\.[0-9]+\.[0-9]+/
      when: on_success

