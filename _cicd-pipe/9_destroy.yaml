destroy:helm:
  stage: destroy
  when: manual
  image:
    name: alpine/k8s:1.34.1
    entrypoint: [""]
  extends: .yc_install
  script:
    - yc managed-kubernetes cluster get-credentials k8s-cluster --external --force
    - export REGISTRY_ID=$(yc container registry get "${CONTAINER_REGISTRY}" | awk '/^id:/ {print $2}')
    - helm uninstall frontend backend --namespace momo-store --ignore-not-found
    - helm uninstall gwin --namespace gwin-space --ignore-not-found
    - helm uninstall prometheus --namespace monitoring --ignore-not-found
    - |
      kubectl delete crd \
        alertmanagerconfigs.monitoring.coreos.com \
        alertmanagers.monitoring.coreos.com \
        prometheusagents.monitoring.coreos.com \
        prometheuses.monitoring.coreos.com \
        prometheusrules.monitoring.coreos.com \
        scrapeconfigs.monitoring.coreos.com \
        servicemonitors.monitoring.coreos.com \
        podmonitors.monitoring.coreos.com \
        probes.monitoring.coreos.com \
        thanosrulers.monitoring.coreos.com \
        --ignore-not-found
    - kubectl delete namespace monitoring --ignore-not-found

# Tears down everything deploy:gwin provisions, in the reverse of the order it
# creates them so YC dependencies are respected: delete the Gateway first so the
# GWIN controller removes its ALB, THEN drop the controller, certificate,
# security group, the leaked k8s-sa authorized keys and the DNS records.
# Idempotent and safe to re-run (every step is guarded / ignores "not found").
#
# Runs as the .yc_install service account (YC_KEY, editor+admin on the folder),
# so it is allowed to delete the k8s-sa authorized keys that deploy:gwin creates
# on every run (`yc iam key create --service-account-name k8s-sa`). k8s-sa is the
# cluster control-plane SA; Terraform never mints authorized keys for it, so the
# GWIN controller (uninstalled below) is the only consumer — all such keys are
# leaks and safe to prune here. Requires the DESEC_TOKEN masked CI variable.
destroy:gwin:
  stage: destroy
  when: manual
  image:
    name: alpine/k8s:1.34.1
    entrypoint: [""]
  extends: .yc_install
  variables:
    # Default placeholder — override with a project CI/CD variable named DOMAIN.
    DOMAIN: "example.dedyn.io"
    CERT_NAME: "momo-store-cert"
    SG_NAME: "momo-alb-sg"
  script:
    - apk add --no-cache jq
    - yc managed-kubernetes cluster get-credentials k8s-cluster --external --force || echo "cluster unavailable — continuing with cloud-side cleanup"
    - |
      set -e
      DESEC_API="https://desec.io/api/v1/domains/${DOMAIN}/rrsets/"
      # deSEC deletes an RRset when it is PUT with an empty records array.
      desec_delete() {
        sub="$1"; rtype="$2"
        curl -sS -X PUT "${DESEC_API}" \
          -H "Authorization: Token ${DESEC_TOKEN}" \
          -H "Content-Type: application/json" \
          -d "[{\"subname\":\"${sub}\",\"type\":\"${rtype}\",\"ttl\":3600,\"records\":[]}]" >/dev/null || true
      }

      # --- 0. capture the ACME challenge CNAME name before the cert is gone -
      CERT_ID=$(yc certificate-manager certificate list --format json | jq -r "[.[] | select(.name==\"${CERT_NAME}\") | .id][0] // empty")
      CH_SUBNAME=""
      if [ -n "${CERT_ID}" ]; then
        CH_NAME=$(yc certificate-manager certificate get --id "${CERT_ID}" --full --format json \
          | jq -r '[.challenges[]? | select(.type=="DNS" and .dns_challenge.type=="CNAME") | .dns_challenge.name][0] // empty')
        [ -n "${CH_NAME}" ] && CH_SUBNAME=$(echo "${CH_NAME}" | sed "s/\.${DOMAIN}\.\{0,1\}$//")
      fi

      # --- 1. delete the Gateway so the controller deletes its ALB ----------
      if kubectl get ns momo-store >/dev/null 2>&1; then
        echo "Uninstalling gwin-resources (Gateway/HTTPRoutes/YCCertificate/GatewayPolicy)..."
        helm uninstall gwin-resources --namespace momo-store --ignore-not-found || true
      fi

      # --- 2. wait for the GWIN-managed ALB to disappear --------------------
      # The SG can't be deleted while the ALB still references it.
      echo "Waiting for the GWIN-managed ALB to be removed..."
      for i in $(seq 1 60); do
        ALB_ID=$(yc application-load-balancer load-balancer list --format json \
          | jq -r '[.[] | select(.labels["gwin-namespace"]=="momo-store" and .labels["gwin-name"]=="momo-gateway")][0].id // empty')
        [ -z "${ALB_ID}" ] && { echo "  ALB removed."; break; }
        echo "  ALB ${ALB_ID} still present... (${i})"
        sleep 10
      done

      # --- 3. remove the GWIN controller ------------------------------------
      echo "Uninstalling gwin controller..."
      helm uninstall gwin --namespace gwin-space --ignore-not-found || true

      # --- 4. delete the managed Let's Encrypt certificate ------------------
      if [ -n "${CERT_ID}" ]; then
        echo "Deleting certificate ${CERT_NAME} (${CERT_ID})..."
        yc certificate-manager certificate delete --id "${CERT_ID}" || true
      fi

      # --- 5. delete the ALB security group (retry until ALB fully detached)-
      SG_ID=$(yc vpc security-group list --format json | jq -r "[.[] | select(.name==\"${SG_NAME}\") | .id][0] // empty")
      if [ -n "${SG_ID}" ]; then
        echo "Deleting security group ${SG_NAME} (${SG_ID})..."
        for i in $(seq 1 12); do
          if yc vpc security-group delete --id "${SG_ID}"; then break; fi
          echo "  SG still in use, retrying in 10s... (${i})"
          sleep 10
        done
      fi

      # --- 6. prune the leaked k8s-sa authorized keys -----------------------
      # deploy:gwin mints a fresh one every run for the (now-removed) controller.
      for KEY_ID in $(yc iam key list --service-account-name k8s-sa --format json | jq -r '.[].id'); do
        echo "Deleting k8s-sa authorized key ${KEY_ID}..."
        yc iam key delete --id "${KEY_ID}" || true
      done

      # --- 7. clean up deSEC records ----------------------------------------
      echo "Removing deSEC apex A record..."
      desec_delete "" "A"
      if [ -n "${CH_SUBNAME}" ]; then
        echo "Removing deSEC ACME challenge CNAME (${CH_SUBNAME})..."
        desec_delete "${CH_SUBNAME}" "CNAME"
      fi

      echo "deploy:gwin resources destroyed."

destroy:s3_bucket:
  stage: destroy
  when: manual
  image: hashicorp/terraform:1.15.5
  extends: .yc_install
  script:
    - yc storage s3 rm s3://${S3_BUCKET} --recursive
    - yc storage bucket delete ${S3_BUCKET}

destroy:container_registry:
  stage: destroy
  when: manual
  image: hashicorp/terraform:1.15.5
  extends: .yc_install
  script:
    - for id in $(yc container image list --registry-name ${CONTAINER_REGISTRY} --format json | jq -r '.[].id'); do yc container image delete --id "$id" --async; done
    - yc container registry delete ${CONTAINER_REGISTRY}

destroy:vm_docker:
  stage: destroy
  when: manual
  needs:
    - job: create_release
      optional: true
  image: hashicorp/terraform:1.15.5
  extends: .yc_install
  script:
    - echo "${SSH_PUB_KEY64}" | base64 -d > /tmp/key.pub
    - KEY_ESCAPED=$(cat /tmp/key.pub | tr '\n' '\\n')
    - cd $CI_PROJECT_DIR/infra/terraform/vm-docker
    - cp $CI_PROJECT_DIR/infra/terraform/sa-key.json $CI_PROJECT_DIR/infra/terraform/vm-docker/sa-key.json
    - terraform init -backend-config="access_key=$ACCESS_KEY" -backend-config="secret_key=$SECRET_KEY"
    - terraform destroy -auto-approve -var="ssh_public_key=${KEY_ESCAPED}" -var="release_tag=${RELEASE_TAG}" -var="nexus_url=${NEXUS_URL}" -var="nexus_repo=${NEXUS_REPO}" -var="nexus_user=${NEXUS_USER}" -var="nexus_password=${NEXUS_PASSWORD}" -var="artifact_back=${ARTIFACT_BACK}" -var="artifact_front=${ARTIFACT_FRONT}" -var="yc_key=${YC_KEY}" -var="yc_cloud_id=${YC_CLOUD_ID}" -var="yc_folder_id=${YC_FOLDER_ID}" -var="container_registry=${CONTAINER_REGISTRY}"

destroy:k8s:
  stage: destroy
  when: manual
  image: hashicorp/terraform:1.15.5
  extends: .yc_install
  script:
    - cd $CI_PROJECT_DIR/infra/terraform/k8s
    - cp $CI_PROJECT_DIR/infra/terraform/sa-key.json $CI_PROJECT_DIR/infra/terraform/k8s/sa-key.json
    - terraform init -backend-config="access_key=$ACCESS_KEY" -backend-config="secret_key=$SECRET_KEY"
    - terraform destroy -auto-approve
