# The Yandex managed control plane cannot reach the in-cluster admission
# webhook pod, so every PrometheusRule create/update blocks ~13s on a webhook
# timeout (failurePolicy: Ignore lets it proceed). With ~38 bundled rules that
# adds ~8 min to each `helm upgrade`. Disable the webhook entirely; the operator
# still validates rules at reconcile time.
prometheusOperator:
  admissionWebhooks:
    enabled: false
  tls:
    enabled: false

alertmanager:
  alertmanagerSpec:
    # Mounts the "telegram-bot-token" Secret (key: token) at
    # /etc/alertmanager/secrets/telegram-bot-token/token
    secrets:
      - telegram-bot-token
  config:
    route:
      group_by: ['alertname', 'severity']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 3h
      receiver: 'telegram'

    receivers:
    - name: 'telegram'
      telegram_configs:
      - bot_token_file: /etc/alertmanager/secrets/telegram-bot-token/token
        chat_id: -5144087552
        parse_mode: 'MarkdownV2'
        message: |-
          {{ range .Alerts }}
          ⚠️ {{ .Labels.severity | toUpper }} ⚠️\
          Alert: `{{ .Labels.alertname }}`
          Instance: `{{ .Labels.instance }}`
          Description: `{{ .Annotations.description }}`
          Message: {{ .Annotations.message }}
          {{ if .Annotations.summary }}Summary: {{ .Annotations.summary }}{{ end }}
          {{ if .Annotations.value }}Value: `{{ .Annotations.value }}`{{ end }}
          Status: `{{ .Status }}`
          Started: `{{ .StartsAt.Format "2006-01-02 15:04:05" }}`

          {{ end }}
