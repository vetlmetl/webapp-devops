sonar.projectKey=devops-final-project
sonar.qualitygate.wait=true

# Sources
sonar.sources=.
sonar.exclusions=**/*_test.go,**/node_modules/**,**/.terraform/**,**/vendor/**,**/dist/**

# Backend (Go)
sonar.go.coverage.reportPaths=coverage.out

# Frontend (Vue/Node — lcov format)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Terraform + Helm — SonarQube scans these natively (IaC analysis)
# No extra config needed, just don't exclude them

# Tests
sonar.test.inclusions=**/*_test.go,**/tests/**,**/*.spec.*