    pid /tmp/nginx.pid;
worker_processes auto;
events {
    worker_connections 1024;
}
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 16M;
    
    # Gzip Settings
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/x-javascript
        application/javascript
        application/xml+rss
        application/json;
    

server {
    listen 8080;
    server_name _;

    # Behind the LoadBalancer/NodeBalancer the client connects on port 80, but
    # nginx listens on 8080 internally. Without this, nginx bakes its own listen
    # port (8080) into 301 Location headers, redirecting clients to a port the
    # LB doesn't expose. Emit relative redirects so the browser keeps the
    # original host:port it used.
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Security headers (X-XSS-Protection dropped: deprecated and ignored by
    # modern browsers). Defined once here and re-included in any location that
    # sets its own add_header, since nginx does not inherit add_header across
    # levels once a location declares one.
    include /etc/nginx/security-headers.conf;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/security-headers.conf;
    }

    # Don't cache HTML files
    location ~* \.html?$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include /etc/nginx/security-headers.conf;
    }

    location = / {
        return 301 /momo-store/catalog;
    }

    location /momo-store/health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location /nginx_status {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    location = /momo-store {
        return 301 /momo-store/catalog;
    }

    location /momo-store/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /momo-store/index.html;
    }

    location /api/ {
        # NOTE: "backend" must match the backend Helm release/Service name in
        # the same namespace. If you rename the release, update this upstream
        # (or template it via an envsubst-rendered config).
        proxy_pass http://backend:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
}
