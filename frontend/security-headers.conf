# Shared security headers.
#
# nginx does NOT merge add_header directives across levels: as soon as a
# location declares its own add_header, every add_header from the enclosing
# server/http block is dropped for that location. So this file is included
# both at the server level and inside any location that sets its own headers
# (e.g. the cache-control locations) to keep the security headers present.

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "no-referrer-when-downgrade" always;
# CSP. The API is reached through the same-origin /api proxy. The SPA's
# index.html loads a few third-party assets from CDNs (all carrying SRI
# integrity hashes), which must be allowlisted or the page renders unstyled:
#   - cdn.jsdelivr.net      : Bootstrap CSS + JS bundle
#   - kit.fontawesome.com   : Font Awesome kit loader script
#   - ka-f.fontawesome.com  : Font Awesome's dynamically-loaded CSS/fonts (+XHR)
#   - res.cloudinary.com    : product images (seeded by the backend)
# 'unsafe-inline' is kept for the inline styles/bootstrap script a built Vue SPA
# emits; tighten further with hashes if you drop those. The cleanest long-term
# fix is to self-host Bootstrap + Font Awesome (npm) so these CDN entries and
# 'unsafe-inline' can go away entirely.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://kit.fontawesome.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://ka-f.fontawesome.com; img-src 'self' data: blob: https://res.cloudinary.com; font-src 'self' data: https://ka-f.fontawesome.com; connect-src 'self' https://ka-f.fontawesome.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
